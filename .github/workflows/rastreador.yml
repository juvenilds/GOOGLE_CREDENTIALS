name: Execução Diária do Rastreador PNCP

on:
  schedule:
    - cron: '0 22 * * *' # Executa todos os dias às 19:00h (Horário de Brasília)
  workflow_dispatch: # Permite que você clique em um botão para testar a qualquer hora

jobs:
  rodar-rastreador:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Recriar credenciais.json do Google
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credenciais.json

    - name: Executar o script rastreador
      run: python rastreador_pncp.py
